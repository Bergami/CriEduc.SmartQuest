name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Policy: fail the pipeline on any HIGH or CRITICAL vulnerability.
# To document a known false-positive add it to .pip-audit-ignore.toml
# with an expiry date and a justification comment.

jobs:
  # ── Security gate ─────────────────────────────────────────────────────────
  vulnerability-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install pip-audit
        run: pip install pip-audit>=2.9.0

      - name: Run pip-audit (fail on HIGH/CRITICAL)
        run: |
          # Baseline ignores — CVEs blocked by Python 3.9.0 (EOL) or pending SQ-DEP-02/05.
          # Review: see .pip-audit-ignore.toml for full justifications and expiry dates.
          IGNORE_FLAGS=(
            # cryptography — fix needs Python !=3.9.0 (SQ-DEP-05)
            --ignore-vuln PYSEC-2026-35
            --ignore-vuln GHSA-79v4-65xg-pq4g
            --ignore-vuln GHSA-r6ph-v2qm-q3c2
            # requests/urllib3 — fix needs Python>=3.10 (SQ-DEP-05)
            --ignore-vuln GHSA-gc5v-m9x4-r6x2
            --ignore-vuln PYSEC-2026-141
            --ignore-vuln PYSEC-2026-142
            # pillow — fix needs Python>=3.10 (SQ-DEP-05)
            --ignore-vuln GHSA-cfh3-3jmp-rvhc
            --ignore-vuln GHSA-pwv6-vv43-88gr
            --ignore-vuln GHSA-r73j-pqj5-w3x7
            --ignore-vuln GHSA-whj4-6x5x-4v2j
            --ignore-vuln GHSA-wjx4-4jcj-g98j
            # python-dotenv — fix needs Python>=3.10 (SQ-DEP-05)
            --ignore-vuln GHSA-mf9w-mj56-hr94
            # python-multipart — fix needs Python>=3.10 (SQ-DEP-05)
            --ignore-vuln GHSA-mj87-hwqh-73pj
            --ignore-vuln GHSA-pp6c-gr5w-3c5g
            --ignore-vuln GHSA-wp53-j4wj-2cfg
            # starlette — fix needs FastAPI upgrade (SQ-DEP-02)
            --ignore-vuln GHSA-2c2j-9gv5-cj73
            --ignore-vuln GHSA-f96h-pmfr-66vw
            # pyjwt — no fix version published yet
            --ignore-vuln PYSEC-2025-183
          )

          pip-audit \
            --requirement requirements.txt \
            --requirement requirements-dev.txt \
            --vulnerability-service osv \
            --format markdown \
            --output pip-audit-report.md \
            "${IGNORE_FLAGS[@]}" || true

          # Gate: fail on any NEW vulnerability not in the baseline above.
          pip-audit \
            --requirement requirements.txt \
            --requirement requirements-dev.txt \
            --vulnerability-service osv \
            "${IGNORE_FLAGS[@]}"

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.md
          retention-days: 30

  # ── Test suite ─────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: vulnerability-scan

    strategy:
      fail-fast: false
      matrix:
        # Python 3.9: production runtime — enforced lockfile with SHA256 hashes.
        # Python 3.10 / 3.11: compatibility probes — pinned source constraints (.in files).
        # Compiled packages (cryptography, Pillow) use different wheels per Python version,
        # so hash-strict lockfile install is only valid for the exact compiled version (3.9).
        # Upgrade production runtime to 3.11 when SQ-DEP-02 (Pydantic v2) is complete.
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # Python 3.9 (production): strict hash-enforced install from compiled lockfile.
      - name: Install dependencies (Python 3.9 — strict lockfile)
        if: matrix.python-version == '3.9'
        run: pip install -r requirements-dev.txt

      # Python 3.10/3.11 (compat probe): install from .in source files without hash enforcement.
      # Compiled wheels (cryptography, Pillow, PyMuPDF) have per-version hashes not in the
      # Python-3.9 lockfile. The .in files guarantee same version ceilings as production.
      - name: Install dependencies (Python 3.10+ — source constraints)
        if: matrix.python-version != '3.9'
        run: |
          pip install -r requirements.in
          pip install pip-tools pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests
        run: pytest tests/ --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}
