#
# REGRAS:
#  - Toda entrada DEVE ter expires <= 90 dias a partir da data de criação.
#  - Nunca ignorar HIGH/CRITICAL sem aprovação do tech lead no PR de origem.
#  - CVEs resolvíveis DEVEM ser corrigidos; usar esta lista só para impossíveis
#    no runtime atual.
